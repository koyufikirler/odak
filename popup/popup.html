<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distraction Hider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-wrapper">

    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <img src="../icons/icon-48.png" alt="Distraction Hider" class="logo-icon" id="logo-icon" />
        <div class="logo-text">
          <span class="logo-name">Distraction Hider</span>
          <span class="logo-tagline">Focus on what matters</span>
        </div>
      </div>
    </header>

    <!-- Pick Mode Toggle -->
    <section class="card pick-mode-card" id="pick-mode-section">
      <div class="pick-mode-info">
        <div class="pick-mode-labels">
          <span class="pick-mode-title">Pick Mode</span>
          <span class="pick-mode-subtitle" id="pick-mode-status">Hover over elements to hide them</span>
        </div>
        <label class="toggle" id="pick-mode-toggle" aria-label="Toggle Pick Mode">
          <input type="checkbox" id="pick-mode-checkbox" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>

      <!-- Mode hint -->
      <div class="pick-hint" id="pick-hint" aria-live="polite">
        <span class="hint-icon">✦</span>
        <span id="hint-text">Click the toggle to start hiding distractions</span>
      </div>
    </section>

    <!-- Stats -->
    <section class="card stats-card">
      <div class="stat-row">
        <div class="stat-item">
          <span class="stat-value" id="hidden-count">0</span>
          <span class="stat-label">Hidden on page</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-badge" id="status-badge">
            <span class="badge-dot"></span>
            <span id="badge-text">Inactive</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Actions -->
    <section class="card actions-card">
      <button class="btn btn-secondary" id="undo-btn" disabled>
        <svg class="btn-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 9L3 5M3 5L7 1M3 5H12C15.866 5 19 8.134 19 12C19 15.866 15.866 19 12 19H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Undo Last
      </button>
      <button class="btn btn-danger" id="restore-btn" disabled>
        <svg class="btn-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 10C15 12.7614 12.7614 15 10 15C7.23858 15 5 12.7614 5 10C5 7.23858 7.23858 5 10 5C11.4 5 12.6667 5.56667 13.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M14 1V6H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Restore All
      </button>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>Press <kbd>Esc</kbd> to exit Pick Mode</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
